name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for your suggestion!
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem does this feature solve, or what is currently missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Screenshots, examples, or other relevant information
    validations:
      required: false